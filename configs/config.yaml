seed: 42
device: auto
output_dir: outputs
checkpoint_dir: checkpoints

data:
  train_image_dir: ./datasets/train/images
  train_mask_dir: ./datasets/train/masks
  val_image_dir: ./datasets/val/images
  val_mask_dir: ./datasets/val/masks
  test_image_dir: ./datasets/test/images
  test_mask_dir: ./datasets/test/masks
  image_size: [512, 512]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  augmentation:
    horizontal_flip: true
    horizontal_flip_p: 0.5
    vertical_flip: false
    vertical_flip_p: 0.5
    rotate90: false
    rotate90_p: 0.5

model:
  in_channels: 3
  num_classes: 1
  base_channels: 32

train:
  batch_size: 4
  epochs: 20
  learning_rate: 0.001
  num_workers: 0
  val_interval: 1
  save_best_only: true
  threshold: 0.5

predict:
  threshold: 0.5
  save_visualization: true
